{% load static %}
<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="{% static 'assets/css/register.css' %}">
</head>

<body>
    <div class="container">
        <div class="register-section">
            <div class="brand-logo">
                <div class="brand-icon">📄</div>
                <div class="brand-name">Academic Service Response (ASR)</div>
            </div>

            <div class="welcome-text">
                <h1 class="welcome-title">Welcome</h1>
                <p class="welcome-subtitle">Please create your new account first.</p>
            </div>

            {% for message in messages %}
            <div class="alert-message {{ message.tags }}">{{ message }}</div>
            {% endfor %}

            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input type="email" id="email" class="form-input" placeholder="example: user@example.com" name="email" required
                            inputmode="email">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="password" class="form-input" placeholder="Password" name="password"
                            required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirm_password">Confirm Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" name="confirm_password" id="confirm_password" class="form-input"
                            placeholder="Confirm Password" required>
                    </div>
                </div>

                <button type="submit" class="register-button">Register</button>
            </form>

            <p class="login-text">
                Already have an account? <a href="{% url 'login' %}" class="login-link">Login here</a>
            </p>
            <div class="copyright">
                <strong>&copy;
                    {% now "Y" %} Academic Service Response (ASR)
                </strong> - All rights reserved.
            </div>
        </div>
    </div>
</body>
</html>
