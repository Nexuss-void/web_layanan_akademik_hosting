{% load static %}
<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="{% static 'assets/css/register.css' %}">
</head>

<body>
    <div class="container">
        <div class="register-section">
            <div class="brand-logo">
                <div class="brand-icon">📄</div>
                <div class="brand-name">Sistem Layanan Akademik</div>
            </div>

            <div class="welcome-text">
                <h1 class="welcome-title">Buat Akun Baru!</h1>
            </div>

            {% for message in messages %}
            <div class="alert-message error">{{ message }}</div>
            {% endfor %}

            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label class="form-label" for="email">Gmail</label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input type="email" id="email" class="form-input" placeholder="Gmail" name="email" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="password" class="form-input" placeholder="Password" name="password"
                            required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirm_password">Konfirmasi Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" name="confirm_password" id="confirm_password" class="form-input"
                            placeholder="Ulangi Password" required>
                    </div>
                </div>

                <button type="submit" class="register-button">DAFTAR</button>
            </form>

            <p class="login-text">
                Sudah punya akun? <a href="{% url 'login' %}" class="login-link">Masuk di sini</a>
            </p>
        </div>

        <div class="hero-section">
            <div class="hero-content">
                <div class="laptop-mockup">
                    <div class="laptop-screen">
                        SISTEM LAYANAN AKADEMIK
                    </div>
                    <div class="laptop-base"></div>
                </div>
            </div>
            <div class="copyright">
                {% now "Y" %} Sistem Layanan Akademik - All rights reserved.
            </div>
        </div>
    </div>
</body>

</html>
