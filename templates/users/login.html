{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="{% static 'assets/css/login.css' %}">
</head>

<body>
    <div class="container">
        <div class="login-section">
            <div class="brand-logo">
                <div class="brand-icon">📄</div>
                <div class="brand-name">Academic Service Response (ASR)</div>
            </div>

            <div class="welcome-text">
                <h1 class="welcome-title">Selamat Datang</h1>
                <p class="welcome-subtitle">Silahkan Masuk Terlebih Dahulu</p>
            </div>

            {% for message in messages %}
            <div class="alert-message error">{{ message }}</div>
            {% endfor %}

            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label class="form-label" for="email">Gmail</label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input type="email" id="email" class="form-input" placeholder="Gmail" name="email" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="password" class="form-input" placeholder="Password" name="password"
                            required>
                    </div>
                </div>

                <button type="submit" class="login-button">LOGIN</button>
            </form>
            <p class="signup-text">
                Don't have an account? <a href="{% url 'register' %}" class="signup-link">Create</a>
            </p>
            <div class="copyright">
                <strong>&copy;
                    {% now "Y" %} Academic Service Response (ASR)
                </strong> - All rights reserved.
            </div>
        </div>
    </div>
</body>

</html>
