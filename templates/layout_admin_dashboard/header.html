{% load static %}
<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin — Academic Service Response</title>
    <link rel="stylesheet" href="{% static 'assets/css/dashboard_admin.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/footer.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/analysis.css' %}">
</head>

<body>
    <div class="app">

        <!-- Overlay gelap saat sidebar terbuka di mobile -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <!-- Tombol close di dalam sidebar untuk mobile -->
            <button class="sidebar-close" id="sidebarClose" aria-label="Tutup menu">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <path d="M18 6L6 18M6 6L18 18" stroke="white" stroke-width="2" stroke-linecap="round" />
                </svg>
            </button>
            <div class="brand">
                <div class="brand-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                        <path d="M4 6.5C4 5.67 4.67 5 5.5 5H13V19H5.5C4.67 19 4 18.33 4 17.5V6.5Z" stroke="white"
                            stroke-width="1.6" />
                        <path d="M20 6.5C20 5.67 19.33 5 18.5 5H13V19H18.5C19.33 19 20 18.33 20 17.5V6.5Z"

            </div>

            <div class="nav-section-label">Menu Utama</div>
            <nav class="nav">
                <a class="nav-item" href="{% url 'dashboard_admin' %}">

                        <rect x="3" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.7" />
                        <rect x="14" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.7" />
                    </svg>
                    Dashboard
                </a>
                                <a class="nav-item" href="{% url 'create_period' %}">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                        <path d="M12 8V12L14.5 13.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.7" />
                    </svg>
                    Input Periode
                </a>
                <a class="nav-item" href="{% url 'create_question' %}">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                        <path
                            d="M4 5.5C4 4.67 4.67 4 5.5 4H18.5C19.33 4 20 4.67 20 5.5V18.5C20 19.33 19.33 20 18.5 20H5.5C4.67 20 4 19.33 4 18.5V5.5Z"

                        <path d="M8 9H16M8 13H16M8 17H12" stroke="currentColor" stroke-width="1.7"
                            stroke-linecap="round" />
                    </svg>
                    Input Pertanyaan
                </a>
                <a class="nav-item" href="{% url 'analysis' %}">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                        <path
                            d="M4 5.5C4 4.67 4.67 4 5.5 4H18.5C19.33 4 20 4.67 20 5.5V18.5C20 19.33 19.33 20 18.5 20H5.5C4.67 20 4 19.33 4 18.5V5.5Z"

                            stroke-linecap="round" />

                </a>

            <div class="nav-spacer"></div>

            <div class="sidebar-foot">

                            stroke-width="1.7" stroke-linecap="round" />

                    </svg>

                </a>

        <!-- MAIN -->

                <button class="hamburger" id="hamburgerBtn" aria-label="Buka menu">

                    <span></span>

                <div>

                    <div class="page-sub">Selamat datang kembali, kelola data kuesioner di sini.</div>

                </div>
